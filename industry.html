<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重点产业 - 呼和浩特城市信息网站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html">呼和浩特信息站</a>
        <nav class="nav">
          <a href="./index.html">首页</a>
          <a href="./population.html">人口结构</a>
          <a href="./economy.html">经济运行</a>
          <a class="active" href="./industry.html">重点产业</a>
          <a href="./education.html">教育发展</a>
          <a href="./planning.html">未来规划</a>
          <a href="./sources.html">数据来源</a>
        </nav>
      </div>
    </div>

    <header class="hero">
      <div class="container">
        <h1>重点产业分析</h1>
        <p>围绕乳业、光伏硅材料、生物医药和现代制造展示产业结构。</p>
      </div>
    </header>

    <main class="container">
      <section class="chart-grid">
        <article class="chart-box">
          <h3>重点产业规模对比（指数）</h3>
          <div class="chart-canvas-wrap">
            <canvas id="keyIndustryScaleChart"></canvas>
          </div>
        </article>
        <article class="chart-box">
          <h3>高新技术企业数量（家）</h3>
          <div class="chart-canvas-wrap">
            <canvas id="highTechCountChart"></canvas>
          </div>
        </article>
        <article class="chart-box">
          <h3>重点产业就业吸纳占比（%）</h3>
          <div class="chart-canvas-wrap">
            <canvas id="industryEmploymentChart"></canvas>
          </div>
        </article>
        <article class="chart-box">
          <h3>产业链完整度评分</h3>
          <div class="chart-canvas-wrap">
            <canvas id="industryChainRadarChart"></canvas>
          </div>
        </article>
      </section>

      <section class="panel">
        <h2>现状判断</h2>
        <ul>
          <li>乳业和光伏硅材料是产业发展的双核心。</li>
          <li>创新主体数量提升，对产业升级形成支撑。</li>
          <li>产业链中高端环节仍有提升空间，建议持续补链强链。</li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>来源示例：发改委公开信息、产业政策文件、统计公报。</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/charts.js"></script>
    <script>
      renderIndustryCharts();
    </script>
  </body>
</html>
